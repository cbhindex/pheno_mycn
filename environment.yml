# Conda environment for the full Pheno-MYCN repository:
# core model + training + visualization + additional experiments.
#
#   conda env create -f environment.yml
#   conda activate pheno-mycn
#
# GPU users: install the CUDA-matched PyTorch build per https://pytorch.org.
name: pheno-mycn
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - pip:
      # --- core model / training / inference ---
      - torch>=1.12
      - torchvision>=0.13
      - pytorch-lightning>=1.6,<2.0
      - torchmetrics>=0.11,<1.0
      - nystrom-attention>=0.0.9
      - numpy>=1.21
      - pandas>=1.3
      - scikit-learn>=1.0
      - pyyaml>=5.4
      - addict>=2.4
      # --- visualization (whole-slide heatmaps / prototype maps) ---
      - matplotlib>=3.5
      - seaborn>=0.12
      - umap-learn>=0.5
      - h5py>=3.6
      - opencv-python>=4.5
      - openslide-python>=1.1
      - Pillow>=9.0
      - scipy>=1.7
      # --- additional experiments ---
      - lifelines>=0.27       # survival analysis (Kaplan-Meier, log-rank)
      - statsmodels>=0.13     # linear mixed-effects models
      - shap>=0.41            # SHAP feature attribution
